# AgentOps configuration — 1.0 flat schema.
#
# The four required fields are 'version', 'agent', 'dataset', and (optionally)
# 'thresholds'. AgentOps infers evaluators from the agent type and dataset
# columns, so most users only need this much.
#
# Examples:
#
#   agent: "my-rag:3"                      # Foundry prompt agent (name:version)
#   agent: "https://...foundry.../agents/" # Foundry hosted endpoint
#   agent: "https://api.example.com/chat"  # any HTTP/JSON agent (ACA, AKS, custom)
#   agent: "model:gpt-4o"                  # raw Foundry model deployment

# Schema version of this agentops.yaml file (not the agent version).
version: 1

# Foundry agent identifier as name:version, where the trailing number is
# the *agent* version published in Foundry (not the schema version above).
agent: "my-agent:1"

dataset: .agentops/data/smoke.jsonl

# Optional. Leave as auto for existing single-turn smoke tests. Set to
# multi-turn when the dataset rows represent conversations / message histories
# so Doctor, Cockpit, and release evidence can treat conversation-level evals as
# part of the readiness proof.
#
# dataset_kind: auto

# Optional. Source-controlled instructions file used by prompt-agent CI/CD.
# Generated prompt-agent deploy workflows create a candidate Foundry version
# from this file, evaluate that exact version, then record it as deployed only
# after the gate passes.
#
# prompt_file: .agentops/prompts/agent-instructions.md

# Optional. Bootstrap defaults for the *first* deploy into an empty Foundry
# project (e.g. brand-new dev / qa / prod). When the prompt-agent deploy
# workflow finds that 'agent' does not exist yet in the target environment,
# it creates the first version from these defaults plus the contents of
# 'prompt_file'. Subsequent deploys ignore this block and follow the normal
# reuse / next-version flow. Requires 'prompt_file' to be set.
#
# Tip: use the same model deployment name across sandbox / dev / qa / prod so
# the bootstrap payload works in every Foundry project without per-env tweaks.
#
# prompt_agent_bootstrap:
#   model: gpt-4o-mini
#   description: "Helps plan short trips and explains tradeoffs."
#   # Optional model parameters and tool definitions are passed through as-is.
#   # model_parameters:
#   #   temperature: 0.2
#   # tools: []

# Optional. Override the auto-selected pass/fail thresholds. AgentOps fills in
# sensible defaults for the metrics that are auto-selected.
#
# thresholds:
#   coherence: ">=3"
#   groundedness: ">=3"
#   avg_latency_seconds: "<=30"
#
# Optional. Context-specific rubric evaluators. When this block is present,
# AgentOps requires execution: azd so the Foundry / azd evaluator actually runs;
# local execution will fail closed instead of pretending rubric scoring happened.
#
# rubrics:
#   - name: travel-concierge-quality
#     evaluator: travel-concierge-rubric
#     dimensions:
#       - name: task_success
#         description: "Completes the requested task without losing context."
#         weight: 0.5
#       - name: safety
#         description: "Avoids unsafe or unsupported claims."
#         weight: 0.3
#
# thresholds:
#   task_success: ">=4"
#   safety: ">=4"

# Optional. Foundry prompt agents and Foundry publishing need a project
# endpoint. If both this value and AZURE_AI_FOUNDRY_PROJECT_ENDPOINT are set,
# this file wins for target invocation and publishing.
#
# project_endpoint: "https://<resource>.services.ai.azure.com/api/projects/<project>"
#
# Optional. Where the agent and evaluators execute.
#   local (default) — AgentOps runs the agent row-by-row locally.
#   cloud           — Foundry runs the agent and evaluators server-side
#                     (only valid for 'name:version' Foundry prompt agents;
#                     implicitly publishes to the New Foundry panel).
#
# execution: local
#
# Optional. Foundry observability readiness metadata. AgentOps reads
# this for Doctor/Cockpit/evidence; Foundry still owns tracing, replay, and
# trace sampling at runtime.
#
# observability:
#   tracing_enabled: true
#   trace_sampling:
#     enabled: true
#     mode: foundry
#   trace_replay_url: "https://ai.azure.com/..."
#   evaluations_url: "https://ai.azure.com/..."
#   datasets_url: "https://ai.azure.com/..."
#
# Optional. Publish local results to the Classic Foundry Evaluations panel.
# Only meaningful when execution: local. With execution: cloud the run is
# always published (Foundry hosts the run by definition).
#   false (default) — only local results.json / report.md are written.
#   true            — execution: local + publish: true → upload to Classic Foundry.
#
# publish: false
